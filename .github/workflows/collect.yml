name: HL position collector

# Snapshots Hyperliquid positions every 10 minutes and commits the growing CSVs back.
# Repo is public so Actions minutes are unlimited (all collected data is public on-chain info).

on:
  schedule:
    - cron: "*/10 * * * *"     # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests websocket-client

      - name: Snapshot positions
        run: python hl_snapshot.py

      - name: Commit data
        run: |
          git config user.name "collector-bot"
          git config user.email "collector-bot@users.noreply.github.com"
          git add -f watchlist.json address_equity.csv positions_snapshots.csv liq_proximity.csv
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "snapshot $(date -u +%FT%TZ)"
            git push
          fi
